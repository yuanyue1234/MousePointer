name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MousePointer ${{ github.ref_name }}
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            鼠标指针配置管理器发布包。

            - 鼠标指针配置生成器_绿色程序.exe：绿色单文件版
            - 鼠标指针配置生成器_安装程序.exe：安装版入口
          files: |
            release-assets/鼠标指针配置生成器_绿色程序.exe
            release-assets/鼠标指针配置生成器_安装程序.exe
