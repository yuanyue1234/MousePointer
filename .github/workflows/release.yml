name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: python
        run: |
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          owner, repo = os.environ["GITHUB_REPOSITORY"].split("/", 1)
          token = os.environ["GITHUB_TOKEN"]
          tag = os.environ["TAG_NAME"]
          api = f"https://api.github.com/repos/{owner}/{repo}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "MousePointerRelease",
          }

          def request(method, url, payload=None, content_type="application/json"):
              data = None
              local_headers = dict(headers)
              if payload is not None:
                  if isinstance(payload, (bytes, bytearray)):
                      data = payload
                  else:
                      data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                  local_headers["Content-Type"] = content_type
              req = urllib.request.Request(url, data=data, headers=local_headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=120) as response:
                      body = response.read()
                      return response.status, json.loads(body.decode("utf-8")) if body else None
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{method} {url} failed: HTTP {exc.code}\n{detail}") from exc

          def optional_request(method, url):
              req = urllib.request.Request(url, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=120) as response:
                      body = response.read()
                      return response.status, json.loads(body.decode("utf-8")) if body else None
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return 404, None
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{method} {url} failed: HTTP {exc.code}\n{detail}") from exc

          status, old_release = optional_request("GET", f"{api}/releases/tags/{urllib.parse.quote(tag, safe='')}")
          if status == 200 and old_release:
              request("DELETE", f"{api}/releases/{old_release['id']}")

          release_body = (
              "鼠标指针配置管理器发布包。\n\n"
              "- MousePointer_Portable.exe：绿色单文件版\n"
              "- MousePointer_Installer.exe：安装版入口\n\n"
              "说明：GitHub Release 会规范化非 ASCII 资产名，中文 exe 名会被改成 _.exe，"
              "因此发布资产使用稳定英文文件名，程序内仍保留中文显示。"
          )
          _, release = request("POST", f"{api}/releases", {
              "tag_name": tag,
              "name": f"MousePointer {tag}",
              "body": release_body,
              "draft": False,
              "prerelease": False,
              "make_latest": "true",
          })

          upload_base = release["upload_url"].split("{", 1)[0]
          assets = [
              (Path("release-assets/鼠标指针配置生成器_绿色程序.exe"), "MousePointer_Portable.exe"),
              (Path("release-assets/鼠标指针配置生成器_安装程序.exe"), "MousePointer_Installer.exe"),
          ]
          for asset, release_name in assets:
              if not asset.exists():
                  raise FileNotFoundError(asset)
              name = urllib.parse.quote(release_name)
              upload_url = f"{upload_base}?name={name}"
              request("POST", upload_url, asset.read_bytes(), "application/octet-stream")
              print(f"uploaded {release_name}")
