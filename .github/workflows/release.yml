name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const { owner, repo } = context.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const assets = [
              "release-assets/鼠标指针配置管理器.exe",
              "release-assets/安装鼠标指针配置管理器.exe",
            ];

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: existing.data.id });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `MousePointer ${tag}`,
              body: [
                "鼠标指针配置管理器发布包。",
                "",
                "- 鼠标指针配置管理器.exe：绿色单文件版",
                "- 安装鼠标指针配置管理器.exe：安装版入口",
              ].join("\n"),
              make_latest: "true",
            });

            for (const assetPath of assets) {
              const data = fs.readFileSync(assetPath);
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.data.id,
                name: path.basename(assetPath),
                data,
                headers: {
                  "content-type": "application/vnd.microsoft.portable-executable",
                  "content-length": data.length,
                },
              });
            }
